{% extends "base.html" %}

{% block content %}
<div class="registration-container">
    <div class="form-card">
        <h2>Event Registration</h2>
        <p>Fill out the details below to secure your spot.</p>
        
        <form action="/register" method="POST" id="registrationForm">
            <div class="form-group">
                <label for="full_name">Full Name</label>
                <input type="text" name="full_name" id="full_name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" name="email" id="email" placeholder="example@email.com" required>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" name="phone" id="phone" placeholder="10-digit number" required>
            </div>

            <div class="form-group">
                <label for="event_choice">Select Event</label>
                <select name="event_choice" id="event_choice">
                    {% for event in events %}
                        <option value="{{ event.name }}">{{ event.name }} - {{ event.date }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="tickets">Number of Tickets</label>
                <input type="number" name="tickets" id="tickets" min="1" max="10" value="1">
            </div>

            <button type="submit" class="btn btn-submit">Confirm Registration</button>
        </form>
    </div>
</div>
{% endblock %}
